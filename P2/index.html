<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grimorio del Destino</title>

<!-- Fuente elegante / arcana -->
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>

<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

<h1>El Grimorio del Destino</h1>

<div class="container">

  <h2 class="subtitle">Ritual de activación</h2>

  <div class="secret">
    <div>✦</div>
    <div>✦</div>
    <div>✦</div>
    <div>✦</div>
  </div>

  <h2 id="tiempo">00:00:00</h2>

  <p>
    Intentos restantes:
    <span id="intentos">7</span>
  </p>

  <p id="mensaje">
    El ritual está en reposo… invoca el inicio cuando estés lista/o.
  </p>

  <div class="grid">
    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>

    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>

    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>

    <button class="empty" disabled></button>
    <button class="num">0</button>
    <button class="empty" disabled></button>
  </div>

  <div class="controls">
    <button id="start">Invocar</button>
    <button id="stop">Sellar</button>
    <button id="reset">Restaurar</button>
  </div>

</div>

</body>
</html>
